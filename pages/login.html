<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 - 품:ON</title>
  <link rel="stylesheet" href="../css/index.css" />
  <link rel="stylesheet" href="../css/copy.css" />
  <link rel="stylesheet" href="../css/common.css" />
  <link rel="stylesheet" href="../css/login.css" />
  <link rel="stylesheet" href="../css/foster-style.css" />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>

<body>
  <header class="wrap" id="header">
    <div class="container">
      <!-- logo area -->
      <div class="logo">
        <a href="../index.html"><img src="../assets/images/header-logo.svg" alt="logo"></a>
      </div>
      <!-- menu area -->
      <ul class="nav-wrapper">
        <li class="select">
          <a href="../index.html" class="link">홈</a>
        </li>
        <li class="select">
          <a href="../pages/shelter.html" class="link">보호소</a>
        </li>
        <li class="select">
          <a href="../pages/animal.html" class="link">입양동물</a>
        </li>
        <li class="select">
          <a href="../pages/foster.html" class="link">임시보호자</a>
        </li>
      </ul>
      <!-- account area -->
      <div class="acc-action">
        <!-- 로딩 상태 -->
        <div class="acc-loading" id="accLoading">
          <div class="acc-spinner"></div>
        </div>

        <!-- 비로그인 상태 -->
        <div class="acc-guest" id="accGuest" style="display:none;">
          <a href="./login.html" class="btn-login">로그인</a>
          <a href="./signup.html" class="btn-signup">회원가입</a>
        </div>

        <!-- 로그인 상태 -->
        <div class="acc-flex" id="accUser" style="display:none;">
          <div class="acc-trigger" id="accTrigger">
            <div class="acc">
              <img src="../assets/images/account.svg">
            </div>
            <div class="name-action">
              <div class="t-M" id="accName">사용자</div>
              <div class="t-S" id="accRole">임시 보호자</div>
            </div>
          </div>

          <ul class="options t-M" id="accOptions">
            <li class="link4">
              <label class="chkLabel" for="protectable">
                <input type="checkbox" id="protectable">
                <span class="checkmark"></span>
                임시보호 가능
              </label>
            </li>
            <li class="link4"><button id="logoutBtn">로그아웃</button></li>
          </ul>
        </div>
      </div>
    </div>
  </header>

  <main class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h1>로그인</h1>
          <p class="login-subtitle">품:ON에 오신 것을 환영합니다</p>
        </div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="이메일을 입력하세요" required autocomplete="email" />
          </div>

          <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password" />
          </div>

          <button type="submit" class="btn-login-submit" id="loginBtn">
            로그인
          </button>
        </form>

        <div class="login-footer">
          <p>아직 회원이 아니신가요? <a href="./signup.html" class="link-signup">회원가입</a></p>
        </div>

      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-right">
        <div class="policy-links">
          <a href="/terms">이용약관</a>
          <span aria-hidden="true">·</span>
          <a href="/privacy">개인정보처리방침</a>
        </div>
        <p class="copyright">© 2026 Life Bridge. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-database-compat.js"></script>

  <!-- Scripts -->
  <script src="../js/firebase-auth.js"></script>
  <script src="../js/acc-options.js" defer></script>
  <script src="../js/login.js"></script>
</body>

</html>
